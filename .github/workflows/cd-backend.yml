name: CD Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  validate-secrets:
    name: Validate required secrets
    runs-on: ubuntu-latest

    steps:
      - name: Check secrets
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASS }}
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          FAILED=0
          for SECRET_NAME in DOCKER_USER DOCKER_PASS RENDER_DEPLOY_HOOK_URL; do
            if [ -z "${!SECRET_NAME}" ]; then
              echo "ERROR: Secret ${SECRET_NAME} no está configurado en GitHub Secrets"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
          echo "Secrets validados correctamente"

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: validate-secrets

    # Expone la referencia de imagen fijada por digest (no por tag) para que el
    # job de deploy dispare un build inmutable y trazable, en vez de :latest.
    outputs:
      image_ref: ${{ steps.image-ref.outputs.image_ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/pedisur-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USER }}/pedisur-backend:latest

      - name: Record and export pinned image reference
        id: image-ref
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          # Digest sha256 del manifest recién pusheado, provisto directamente por
          # build-push-action (no es el tag). Ya incluye el prefijo "sha256:".
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if [ -z "$DIGEST" ]; then
            echo "ERROR: build-push-action no devolvió el digest del manifest"
            exit 1
          fi
          IMAGE_REF="docker.io/${DOCKER_USER}/pedisur-backend@${DIGEST}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "### Docker Image" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag legible: \`docker.io/${DOCKER_USER}/pedisur-backend:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy inmutable (por digest): \`${IMAGE_REF}\`" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [validate-secrets, docker]

    steps:
      - name: Trigger deploy pinned to image digest
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          image_ref: ${{ needs.docker.outputs.image_ref }}
        run: |
          if [ -z "$image_ref" ]; then
            echo "ERROR: el job docker no expuso la referencia de imagen por digest"
            exit 1
          fi
          # imgURL contiene '/', '@' y ':' → se URL-encodea para pasarlo como
          # query param del deploy hook sin romper la URL.
          encoded=$(jq -rn --arg v "$image_ref" '$v|@uri')
          echo "Disparando deploy en Render fijado a: $image_ref"
          curl -fsS -X POST "${deploy_url}&imgURL=${encoded}"
