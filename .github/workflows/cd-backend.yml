name: CD Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  validate-secrets:
    name: Validate required secrets
    runs-on: ubuntu-latest

    steps:
      - name: Check secrets
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASS }}
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          FAILED=0
          for SECRET_NAME in DOCKER_USER DOCKER_PASS RENDER_DEPLOY_HOOK_URL; do
            if [ -z "${!SECRET_NAME}" ]; then
              echo "ERROR: Secret ${SECRET_NAME} no está configurado en GitHub Secrets"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
          echo "Secrets validados correctamente"

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: validate-secrets

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/laroka-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USER }}/laroka-backend:latest

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [validate-secrets, docker]

    steps:
      - name: Trigger deploy
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl -X POST "$deploy_url"
