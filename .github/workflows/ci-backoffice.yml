name: CI Backoffice

on:
  pull_request:
    branches:
      - main
    paths:
      - 'backoffice/**'

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backoffice/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backoffice

      - name: Lint (ESLint)
        run: npm run lint
        working-directory: backoffice

      - name: Build
        run: npm run build
        working-directory: backoffice

      - name: Test
        run: npm test
        working-directory: backoffice
