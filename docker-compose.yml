services:
  postgres:
    image: postgres:16
    container_name: laroka-postgres
    environment:
      POSTGRES_DB: laroka
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - laroka-postgres-data:/var/lib/postgresql/data

volumes:
  laroka-postgres-data:
