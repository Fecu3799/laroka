spring:
  application:
    name: laroka-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          "time_zone": UTC
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:28800000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://192.168.1.114:5173}

mercadopago:
  key: ${MERCADOPAGO_ACCESS_TOKEN:}
  webhook-secret: ${MERCADOPAGO_WEBHOOK_SECRET:}

order:
  expiration-minutes: ${ORDER_EXPIRATION_MINUTES:30}
  bypass-branch-hours: ${APP_DEV_BYPASS_BRANCH_HOURS:${APP_DEV_MODE:false}}

debug:
  skip-webhook-signature-validation: ${APP_DEV_SKIP_WEBHOOK_VALIDATION:${APP_DEV_MODE:false}}

r2:
  access-key: ${R2_ACCESS_KEY:}
  secret-key: ${R2_SECRET_KEY:}
  bucket-name: ${R2_BUCKET_NAME:laroka-dev}
  endpoint: ${R2_ENDPOINT:}

rate:
  limit:
    menu:
      max-requests: ${RATE_LIMIT_MENU_MAX_REQUESTS:60}
    orders:
      max-requests: ${RATE_LIMIT_ORDERS_MAX_REQUESTS:10}
    login:
      max-requests: ${RATE_LIMIT_LOGIN_MAX_REQUESTS:10}
      window-seconds: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}

swagger:
  enabled: ${APP_DEV_SWAGGER_ENABLED:${APP_DEV_MODE:false}}

springdoc:
  api-docs:
    enabled: ${APP_DEV_SWAGGER_ENABLED:${APP_DEV_MODE:false}}
  swagger-ui:
    enabled: ${APP_DEV_SWAGGER_ENABLED:${APP_DEV_MODE:false}}
    path: /swagger-ui.html
