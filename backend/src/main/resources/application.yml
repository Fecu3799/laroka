spring:
  application:
    name: laroka-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          "time_zone": UTC
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: true

server:
  port: 8080

logging:
  structured:
    format:
      console: ecs

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:28800000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

mercadopago:
  key: ${MERCADOPAGO_KEY:}
  webhook-secret: ${MERCADOPAGO_WEBHOOK_SECRET:}

order:
  expiration-minutes: ${ORDER_EXPIRATION_MINUTES:30}

r2:
  access-key: ${R2_ACCESS_KEY:}
  secret-key: ${R2_SECRET_KEY:}
  bucket-name: ${R2_BUCKET_NAME:laroka-dev}
  endpoint: ${R2_ENDPOINT:}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html
