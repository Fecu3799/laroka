spring:
  application:
    name: laroka-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  server:
    port: 8080

  management:
    endpoints:
      web:
        exposure:
          include: health
    endpoint:
      health:
        show-details: never
