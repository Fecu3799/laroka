spring:
  application:
    name: pedisur-backend
  servlet:
    multipart:
      # Límite de la capa de parsing multipart. Se alinea con MAX_UPLOAD_SIZE_MB
      # para que la validación de negocio (US-15-01) sea la autoridad; si igual se
      # excede a nivel transporte, MaxUploadSizeExceededException retorna 400.
      max-file-size: ${MAX_UPLOAD_SIZE_MB:5}MB
      max-request-size: ${MAX_UPLOAD_SIZE_MB:5}MB
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 120000
      max-lifetime: 180000
      keepalive-time: 60000
      connection-timeout: 20000
      validation-timeout: 3000
      connection-test-query: SELECT 1
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          "time_zone": UTC
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, metrics
  endpoint:
    health:
      show-details: never
  # Export de métricas Micrometer a New Relic. client-provider-type=insights-agent
  # reutiliza el agente Java ya cargado por -javaagent (Dockerfile) para enviar los
  # datos, por lo que NO requiere api-key ni account-id propios. Spring Boot expone
  # automáticamente las métricas hikaricp.* del datasource activo.
  newrelic:
    metrics:
      export:
        client-provider-type: insights-agent
        step: 30s

jwt:
  secret: ${JWT_SECRET}
  # US-SEC-05: secret previo opcional para grace period durante rotación. Vacío
  # por defecto. Ver README → "Seguridad — Rotación de Secretos".
  secret-previous: ${JWT_SECRET_PREVIOUS:}
  expiration: ${JWT_EXPIRATION:1800000}

refresh:
  token:
    expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS:7}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://192.168.1.114:5173,http://localhost:4173}

mercadopago:
  key: ${MERCADOPAGO_ACCESS_TOKEN:}
  webhook-secret: ${MERCADOPAGO_WEBHOOK_SECRET:}
  notifications-url: ${MERCADOPAGO_NOTIFICATIONS_URL:}

# Email transaccional (US-17-06) — proveedor Resend vía API HTTP.
# Si email.api-key está vacío, EmailService opera en modo no-op (loguea y no envía).
email:
  api-key: ${RESEND_API_KEY:}
  from: ${EMAIL_FROM:}

# Casilla fija que recibe los reportes de bugs del backoffice (US-17-07).
bug-report:
  email: ${BUG_REPORT_EMAIL:}

order:
  expiration-minutes: ${ORDER_EXPIRATION_MINUTES:30}

# US-17-08: horas que un reembolso puede quedar sin resolver (REFUND_FAILED) antes
# de avisarle al cliente de la demora. El aviso se envía una sola vez por pedido.
refund:
  delay-notice-hours: ${REFUND_DELAY_NOTICE_HOURS:24}

debug:
  skip-webhook-signature-validation: ${APP_DEV_SKIP_WEBHOOK_VALIDATION:${APP_DEV_MODE:false}}

r2:
  access-key: ${R2_ACCESS_KEY:}
  secret-key: ${R2_SECRET_KEY:}
  bucket-name: ${R2_BUCKET_NAME:pedisur-dev}
  endpoint: ${R2_ENDPOINT:}
  # Base de la URL pública del bucket (ej: https://<hash>.r2.dev o dominio
  # custom). Es distinta del endpoint S3 de escritura. La URL retornada por el
  # upload se construye como ${r2.public-url}/{tenantId}/{uuid}.{ext}.
  public-url: ${R2_PUBLIC_URL:}

  test:
    access-key: ${R2_TEST_ACCESS_KEY:}
    secret-key: ${R2_TEST_SECRET_KEY:}
    bucket-name: ${R2_TEST_BUCKET_NAME:pedisur-test}
    endpoint: ${R2_TEST_ENDPOINT:}
    public-url: ${R2_TEST_PUBLIC_URL:}

media:
  # Tamaño máximo de imagen permitido en el endpoint de upload (US-15-01).
  max-upload-size-mb: ${MAX_UPLOAD_SIZE_MB:5}

rate:
  limit:
    menu:
      max-requests: ${RATE_LIMIT_MENU_MAX_REQUESTS:60}
    orders:
      max-requests: ${RATE_LIMIT_ORDERS_MAX_REQUESTS:10}
    login:
      max-requests: ${RATE_LIMIT_LOGIN_MAX_REQUESTS:10}
      window-seconds: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}

cache:
  menu:
    ttl-seconds: ${CACHE_MENU_TTL_SECONDS:600}

vapid:
  public-key: ${VAPID_PUBLIC_KEY:}
  private-key: ${VAPID_PRIVATE_KEY:}
  subject: ${VAPID_SUBJECT:mailto:soporte@pedisur.app}

swagger:
  enabled: ${APP_DEV_SWAGGER_ENABLED:${APP_DEV_MODE:false}}

springdoc:
  api-docs:
    enabled: ${APP_DEV_SWAGGER_ENABLED:${APP_DEV_MODE:false}}
  swagger-ui:
    enabled: ${APP_DEV_SWAGGER_ENABLED:${APP_DEV_MODE:false}}
    path: /swagger-ui.html
