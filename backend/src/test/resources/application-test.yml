spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/laroka_test
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          "time_zone": UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: true

jwt:
  secret: test-secret-minimum-32-chars-for-hmac256-ok
  expiration: 3600000

cors:
  allowed-origins: http://localhost:5173

order:
  bypass-branch-hours: true
