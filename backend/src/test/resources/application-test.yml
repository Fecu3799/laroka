spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        jdbc:
          "time_zone": UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: true

jwt:
  secret: test-secret-minimum-32-chars-for-hmac256-ok
  expiration: 3600000

cors:
  allowed-origins: http://localhost:5173

order:
  bypass-branch-hours: true
